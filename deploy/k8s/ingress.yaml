apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blackmane
  namespace: blackmane
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - blackmane.local
      secretName: blackmane-tls
  rules:
    - host: blackmane.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
