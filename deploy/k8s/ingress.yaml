apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blackmane
  namespace: blackmane
spec:
  ingressClassName: nginx
  rules:
    - host: blackmane.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
